{% extends "base.html" %}
{% load static %}

{% block title %}ورود — CRM{% endblock %}

{% block auth_content %}
<div class="card shadow border-0" style="width:100%;max-width:400px;">
  <div class="card-body p-5">
    <div class="text-center mb-4">
      <i class="bi bi-grid-3x3-gap-fill text-primary fs-1"></i>
      <h4 class="fw-bold mt-2 mb-0">CRM System</h4>
      <small class="text-muted">برای ورود اطلاعات خود را وارد کنید</small>
    </div>

    {% if error %}
    <div class="alert alert-danger" role="alert">{{ error }}</div>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      <div class="mb-3">
        <label for="email" class="form-label fw-semibold">ایمیل</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" id="email" name="email"
                 placeholder="admin@crm.com" autocomplete="email" required />
        </div>
      </div>
      <div class="mb-4">
        <label for="password" class="form-label fw-semibold">رمز عبور</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="••••••••" autocomplete="current-password" required />
          <button class="btn btn-outline-secondary" type="button" id="togglePwd">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold">
        ورود
      </button>
    </form>
  </div>
</div>

<script>
document.getElementById('togglePwd').addEventListener('click', () => {
  const pwd = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  if (pwd.type === 'password') {
    pwd.type = 'text';
    icon.className = 'bi bi-eye-slash';
  } else {
    pwd.type = 'password';
    icon.className = 'bi bi-eye';
  }
});
</script>
{% endblock %}
